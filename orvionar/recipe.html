<!DOCTYPE html>
<html>
<head>
    <title>Simple Media Page</title>
</head>
<body>

    <h2>Media Page</h2>

    <!-- Image -->
    <h3>My Image</h3>
    <img src="C:\Users\vincy\Downloads\download.jfif" alt="Sample Image" width="300">

    <br><br>

    <!-- Video -->
    <h3>My Video</h3>
    <video width="300" controls>
        <source src="https://www.youtube.com/shorts/jMTNsI8CSXA?feature=share" type="video/mp4">
    </video>

    <br><br>

    <!-- YouTube Video -->
    <h3>YouTube Video</h3>
    <iframe width="300" height="200"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        allowfullscreen>
    </iframe>

    <br><br>

    <!-- Audio -->
    <h3>My Audio</h3>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
